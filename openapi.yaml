openapi: 3.1.0
info:
  title: Flexo MMS Layer 1 Service API
  description: >
    RESTful API for the Flexo MMS Layer 1 Service. Manages organizations,
    repositories, branches, locks, commits, diffs, scratches, collections,
    artifacts, groups, and policies. Backed by a SPARQL 1.1 quad-store.
    Uses Linked Data Platform (LDP) and Graph Store Protocol (GSP) conventions.
  version: 1.0.0
  license:
    name: Apache 2.0
    identifier: Apache-2.0

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - bearerAuth: []

tags:
  - name: Organizations
  - name: Repositories
  - name: Branches
  - name: Locks
  - name: Commits
  - name: Diffs
  - name: Squash
  - name: Model Graph
  - name: Scratches
  - name: Scratch Graph
  - name: Collections
  - name: Collection Graph
  - name: Artifacts
  - name: Groups
  - name: Policies
  - name: SPARQL Query
  - name: SPARQL Update

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    orgId:
      name: orgId
      in: path
      required: true
      schema:
        type: string
      example: my-org
    repoId:
      name: repoId
      in: path
      required: true
      schema:
        type: string
      example: my-repo
    branchId:
      name: branchId
      in: path
      required: true
      schema:
        type: string
      example: main
    lockId:
      name: lockId
      in: path
      required: true
      schema:
        type: string
      example: my-lock
    commitId:
      name: commitId
      in: path
      required: true
      schema:
        type: string
      example: abc123
    #diffId:
    #  name: diffId
    #  in: path
    #  required: true
    #  schema:
    #    type: string
    #  example: diff-001
    scratchId:
      name: scratchId
      in: path
      required: true
      schema:
        type: string
      example: my-scratch
    collectionId:
      name: collectionId
      in: path
      required: true
      schema:
        type: string
      example: my-collection
    artifactId:
      name: artifactId
      in: path
      required: true
      schema:
        type: string
      example: my-artifact
    groupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
      example: my-group
    policyId:
      name: policyId
      in: path
      required: true
      schema:
        type: string
      example: my-policy
    slugHeader:
      name: Slug
      in: header
      required: false
      description: >
        LDP Slug header. Becomes the new resource's identifier.
        If omitted, a UUID is generated.
      schema:
        type: string
      example: my-resource-id
    ifMatch:
      name: If-Match
      in: header
      required: false
      description: ETag precondition for conditional requests.
      schema:
        type: string

  headers:
    ETag:
      description: Entity tag for the resource.
      schema:
        type: string
    Location:
      description: URI of the newly created resource.
      schema:
        type: string
        format: uri

  responses:
    TurtleResponse:
      description: Successful response in Turtle RDF format.
      headers:
        ETag:
          $ref: '#/components/headers/ETag'
      content:
        text/turtle:
          schema:
            type: string
    SparqlResultsJsonResponse:
      description: Successful SPARQL query response in JSON format.
      content:
        application/sparql-results+json:
          schema:
            type: object
    HeadResponse:
      description: Metadata-only response (no body).
      headers:
        ETag:
          $ref: '#/components/headers/ETag'
    CreatedResponse:
      description: Resource created.
      headers:
        ETag:
          $ref: '#/components/headers/ETag'
        Location:
          $ref: '#/components/headers/Location'
      content:
        text/turtle:
          schema:
            type: string
    NoContent:
      description: No content.
    NotAllowed:
      description: Method not allowed.
    NotFound:
      description: Resource not found.
    Forbidden:
      description: Forbidden — insufficient permissions.
    BadRequest:
      description: Bad request.
    Conflict:
      description: Conflict — another transaction is in progress.
    NotImplemented:
      description: Not implemented.

  requestBodies:
    TurtleBody:
      description: RDF Turtle document describing the resource.
      required: true
      content:
        text/turtle:
          schema:
            type: string
    SparqlUpdateBody:
      description: SPARQL Update request.
      required: true
      content:
        application/sparql-update:
          schema:
            type: string
    SparqlQueryBody:
      description: SPARQL Query request.
      required: true
      content:
        application/sparql-query:
          schema:
            type: string
    RdfBody:
      description: RDF document (Turtle, JSON-LD, RDF/XML, N-Triples, etc.)
      required: true
      content:
        text/turtle:
          schema:
            type: string
        application/ld+json:
          schema:
            type: string
        application/rdf+xml:
          schema:
            type: string
        application/n-triples:
          schema:
            type: string
    AnyBody:
      description: Arbitrary content (binary or text).
      required: true
      content:
        '*/*':
          schema:
            type: string
            contentEncoding: base64

paths:
  # ──────────────────────────── Organizations ────────────────────────────
  /orgs:
    head:
      tags: [Organizations]
      summary: State of all organizations
      operationId: headOrgs
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
    get:
      tags: [Organizations]
      summary: List all organizations
      operationId: getOrgs
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
    post:
      tags: [Organizations]
      summary: Create a new organization
      operationId: createOrg
      parameters:
        - $ref: '#/components/parameters/slugHeader'
      requestBody:
        required: true
        content:
          text/turtle:
            schema:
              type: string
            example: |
              <> dct:title "My Organization"@en ;
                  .
      responses:
        '201':
          $ref: '#/components/responses/CreatedResponse'

  /orgs/{orgId}:
    parameters:
      - $ref: '#/components/parameters/orgId'
    head:
      tags: [Organizations]
      summary: State of an organization
      operationId: headOrg
      parameters:
        - $ref: '#/components/parameters/ifMatch'
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      tags: [Organizations]
      summary: Read an organization
      operationId: getOrg
      parameters:
        - $ref: '#/components/parameters/ifMatch'
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Organizations]
      summary: Create or replace an organization
      operationId: createOrReplaceOrg
      requestBody:
        required: true
        content:
          text/turtle:
            schema:
              type: string
            example: |
              <> dct:title "My Organization"@en ;
                  .
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
        '201':
          $ref: '#/components/responses/CreatedResponse'
    patch:
      tags: [Organizations]
      summary: Update an organization
      operationId: updateOrg
      parameters:
        - $ref: '#/components/parameters/ifMatch'
      requestBody:
        required: true
        content:
          application/sparql-update:
            schema:
              type: string
            example: |
              prefix foaf: <http://xmlns.com/foaf/0.1/>

              delete {
                  <> foaf:homepage ?homepage .
              }
              insert {
                  <> foaf:homepage <https://www.openmbee.org/> .
              }
              where {
                  optional {
                      <> foaf:homepage ?homepage .
                  }
              }
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────── Repositories ────────────────────────────
  /orgs/{orgId}/repos:
    parameters:
      - $ref: '#/components/parameters/orgId'
    head:
      tags: [Repositories]
      summary: State of all repositories
      operationId: headRepos
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
    get:
      tags: [Repositories]
      summary: List all repositories
      operationId: getRepos
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
    post:
      tags: [Repositories]
      summary: Create a new repository
      operationId: createRepo
      parameters:
        - $ref: '#/components/parameters/slugHeader'
      requestBody:
        required: true
        content:
          text/turtle:
            schema:
              type: string
            example: |
              <> dct:title "My Repository"@en ;
                  .
      responses:
        '201':
          $ref: '#/components/responses/CreatedResponse'

  /orgs/{orgId}/repos/{repoId}:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
    head:
      tags: [Repositories]
      summary: State of a repository
      operationId: headRepo
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
    get:
      tags: [Repositories]
      summary: Read a repository
      operationId: getRepo
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
    put:
      tags: [Repositories]
      summary: Create or replace a repository
      operationId: createOrReplaceRepo
      requestBody:
        required: true
        content:
          text/turtle:
            schema:
              type: string
            example: |
              <> dct:title "My Repository"@en ;
                  .
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
        '201':
          $ref: '#/components/responses/CreatedResponse'
    patch:
      tags: [Repositories]
      summary: Update a repository
      operationId: updateRepo
      parameters:
        - $ref: '#/components/parameters/ifMatch'
      requestBody:
        required: true
        content:
          application/sparql-update:
            schema:
              type: string
            example: |
              prefix foaf: <http://xmlns.com/foaf/0.1/>

              delete {
                  <> foaf:homepage ?homepage .
              }
              insert {
                  <> foaf:homepage <https://www.openmbee.org/> .
              }
              where {
                  optional {
                      <> foaf:homepage ?homepage .
                  }
              }
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'

  /orgs/{orgId}/repos/{repoId}/graph:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
    head:
      tags: [Repositories]
      summary: State of repository metadata graph
      operationId: headRepoGraph
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
    get:
      tags: [Repositories]
      summary: Read repository metadata graph
      operationId: getRepoGraph
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'

  # ──────────────────────────── Branches ────────────────────────────
  /orgs/{orgId}/repos/{repoId}/branches:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
    head:
      tags: [Branches]
      summary: State of all branches
      operationId: headBranches
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
    get:
      tags: [Branches]
      summary: List all branches
      operationId: getBranches
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
    post:
      tags: [Branches]
      summary: Create a new branch
      operationId: createBranchViaPost
      parameters:
        - $ref: '#/components/parameters/slugHeader'
      requestBody:
        required: true
        content:
          text/turtle:
            schema:
              type: string
            example: |
              <> mms:ref <./branches/main> ;
                  dct:title "Feature Branch"@en ;
                  .
      responses:
        '201':
          $ref: '#/components/responses/CreatedResponse'

  /orgs/{orgId}/repos/{repoId}/branches/{branchId}:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
      - $ref: '#/components/parameters/branchId'
    head:
      tags: [Branches]
      summary: State of a branch
      operationId: headBranch
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
    get:
      tags: [Branches]
      summary: Read a branch
      operationId: getBranch
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
    put:
      tags: [Branches]
      summary: Create a branch
      operationId: createBranch
      requestBody:
        required: true
        content:
          text/turtle:
            schema:
              type: string
            example: |
              <> mms:ref <./branches/main> ;
                  dct:title "Feature Branch"@en ;
                  .
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
        '201':
          $ref: '#/components/responses/CreatedResponse'
    patch:
      tags: [Branches]
      summary: Update branch metadata
      operationId: updateBranch
      parameters:
        - $ref: '#/components/parameters/ifMatch'
      requestBody:
        required: true
        content:
          application/sparql-update:
            schema:
              type: string
            example: |
              prefix dct: <http://purl.org/dc/terms/>

              delete {
                  <> dct:title ?oldTitle .
              }
              insert {
                  <> dct:title "Renamed Branch"@en .
              }
              where {
                  optional { <> dct:title ?oldTitle . }
              }
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
    delete:
      tags: [Branches]
      summary: Delete a branch (not implemented)
      operationId: deleteBranch
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'

  # ──────────────────────────── Locks ────────────────────────────
  /orgs/{orgId}/repos/{repoId}/locks:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
    head:
      tags: [Locks]
      summary: State of all locks
      operationId: headLocks
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
    get:
      tags: [Locks]
      summary: List all locks
      operationId: getLocks
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
    post:
      tags: [Locks]
      summary: Create a new lock
      operationId: createLockViaPost
      parameters:
        - $ref: '#/components/parameters/slugHeader'
      requestBody:
        required: true
        content:
          text/turtle:
            schema:
              type: string
            example: |
              <> mms:ref <./branches/main> ;
                  dct:title "Release v1.0 Lock"@en ;
                  .
      responses:
        '201':
          $ref: '#/components/responses/CreatedResponse'

  /orgs/{orgId}/repos/{repoId}/locks/{lockId}:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
      - $ref: '#/components/parameters/lockId'
    head:
      tags: [Locks]
      summary: State of a lock
      operationId: headLock
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
    get:
      tags: [Locks]
      summary: Read a lock
      operationId: getLock
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
    put:
      tags: [Locks]
      summary: Create a lock
      operationId: createLock
      requestBody:
        required: true
        content:
          text/turtle:
            schema:
              type: string
            example: |
              <> mms:ref <./branches/main> ;
                  dct:title "Release v1.0 Lock"@en ;
                  .
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
        '201':
          $ref: '#/components/responses/CreatedResponse'
    patch:
      tags: [Locks]
      summary: Update lock metadata
      operationId: updateLock
      parameters:
        - $ref: '#/components/parameters/ifMatch'
      requestBody:
        required: true
        content:
          application/sparql-update:
            schema:
              type: string
            example: |
              prefix dct: <http://purl.org/dc/terms/>

              delete {
                  <> dct:title ?oldTitle .
              }
              insert {
                  <> dct:title "Renamed Lock"@en .
              }
              where {
                  optional { <> dct:title ?oldTitle . }
              }
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
    delete:
      tags: [Locks]
      summary: Delete a lock (not implemented)
      operationId: deleteLock
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'

  # ──────────────────────────── Lock Model Graph ────────────────────────────
  /orgs/{orgId}/repos/{repoId}/locks/{lockId}/graph:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
      - $ref: '#/components/parameters/lockId'
    head:
      tags: [Model Graph]
      summary: State of a lock's model graph
      operationId: headLockGraph
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
    get:
      tags: [Model Graph]
      summary: Read a lock's model graph
      operationId: getLockGraph
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'

  # ──────────────────────────── Commits ────────────────────────────
  /orgs/{orgId}/repos/{repoId}/commits:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
    head:
      tags: [Commits]
      summary: State of all commits
      operationId: headCommits
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
    get:
      tags: [Commits]
      summary: List all commits
      operationId: getCommits
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'

  /orgs/{orgId}/repos/{repoId}/commits/{commitId}:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
      - $ref: '#/components/parameters/commitId'
    head:
      tags: [Commits]
      summary: State of a commit
      operationId: headCommit
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
    get:
      tags: [Commits]
      summary: Read a commit
      operationId: getCommit
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
    patch:
      tags: [Commits]
      summary: Update commit metadata
      operationId: updateCommit
      parameters:
        - $ref: '#/components/parameters/ifMatch'
      requestBody:
        required: true
        content:
          application/sparql-update:
            schema:
              type: string
            example: |
              prefix dct: <http://purl.org/dc/terms/>

              insert {
                  <> dct:description "Hotfix for issue #42"@en .
              }
              where {}
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'

  # ──────────────────────────── Diffs ────────────────────────────
  /orgs/{orgId}/repos/{repoId}/diffs:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
    post:
      tags: [Diffs]
      summary: Create a new diff between two refs
      operationId: createDiff
      requestBody:
        required: true
        content:
          text/turtle:
            schema:
              type: string
            example: |
              <> mms:srcRef <./locks/lock-a> ;
                  mms:dstRef <./locks/lock-b> ;
                  .
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'

  # ──────────────────────────── Squash ────────────────────────────
  /orgs/{orgId}/repos/{repoId}/squash:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
    post:
      tags: [Squash]
      summary: Squash a linear commit range between two locks
      operationId: squashCommits
      description: >
        Accepts a Turtle RDF body with two lock references (mms:srcRef and
        mms:dstRef), verifies a linear commit path between the two locks'
        commits, removes intermediate commits, and replaces the newer lock's
        commit data patch with a single squashed diff.
      requestBody:
        required: true
        content:
          text/turtle:
            schema:
              type: string
            example: |
              <> mms:srcRef <./locks/older-lock> ;
                  mms:dstRef <./locks/newer-lock> ;
                  .
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────── Model Graph (Branch) ────────────────────────────
  /orgs/{orgId}/repos/{repoId}/branches/{branchId}/graph:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
      - $ref: '#/components/parameters/branchId'
    head:
      tags: [Model Graph]
      summary: State of a branch's model graph
      operationId: headBranchGraph
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
    get:
      tags: [Model Graph]
      summary: Read a branch's model graph
      operationId: getBranchGraph
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
    put:
      tags: [Model Graph]
      summary: Load (overwrite) a branch's model graph
      operationId: loadBranchGraph
      requestBody:
        $ref: '#/components/requestBodies/RdfBody'
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  # ──────────────────────────── Scratches ────────────────────────────
  /orgs/{orgId}/repos/{repoId}/scratches:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
    head:
      tags: [Scratches]
      summary: State of all scratches
      operationId: headScratches
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
    get:
      tags: [Scratches]
      summary: List all scratches
      operationId: getScratches
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
    post:
      tags: [Scratches]
      summary: Create a new scratch
      operationId: createScratch
      parameters:
        - $ref: '#/components/parameters/slugHeader'
      requestBody:
        required: true
        content:
          text/turtle:
            schema:
              type: string
            example: |
              <> dct:title "My Scratch Space"@en ;
                  .
      responses:
        '201':
          $ref: '#/components/responses/CreatedResponse'

  /orgs/{orgId}/repos/{repoId}/scratches/{scratchId}:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
      - $ref: '#/components/parameters/scratchId'
    head:
      tags: [Scratches]
      summary: State of a scratch
      operationId: headScratch
      responses:
        '200':
          $ref: '#/components/responses/HeadResponse'
    get:
      tags: [Scratches]
      summary: Read a scratch
      operationId: getScratch
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
    put:
      tags: [Scratches]
      summary: Create or replace a scratch
      operationId: createOrReplaceScratch
      requestBody:
        required: true
        content:
          text/turtle:
            schema:
              type: string
            example: |
              <> dct:title "My Scratch Space"@en ;
                  .
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'
        '201':
          $ref: '#/components/responses/CreatedResponse'
    patch:
      tags: [Scratches]
      summary: Update scratch metadata
      operationId: updateScratchMetadata
      parameters:
        - $ref: '#/components/parameters/ifMatch'
      requestBody:
        required: true
        content:
          application/sparql-update:
            schema:
              type: string
            example: |
              prefix dct: <http://purl.org/dc/terms/>

              delete {
                  <> dct:title ?oldTitle .
              }
              insert {
                  <> dct:title "Renamed Scratch"@en .
              }
              where {
                  optional { <> dct:title ?oldTitle . }
              }
      responses:
        '200':
          $ref: '#/components/responses/TurtleResponse'

