      - $ref: '#/components/parameters/repoId'
      - $ref: '#/components/parameters/branchId'
    post:
      tags: [SPARQL Update]
      summary: Commit a SPARQL Update to a branch's model
      operationId: commitModel
      description: >
        Applies a SPARQL Update to the branch's staging graph, computes
        the diff against the current model, and creates a new commit.
      requestBody:
        $ref: '#/components/requestBodies/SparqlUpdateBody'
      responses:
        '201':
          $ref: '#/components/responses/CreatedResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /orgs/{orgId}/repos/{repoId}/scratches/{scratchId}/update:
