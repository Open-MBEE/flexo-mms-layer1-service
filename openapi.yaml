      tags: [SPARQL Update]
      summary: Apply a SPARQL Update to a scratch graph
      operationId: updateScratch
      requestBody:
        $ref: '#/components/requestBodies/SparqlUpdateBody'
      responses:
        '200':
          description: Update applied successfully.
          content:
            text/plain:
              schema:
                type: string
