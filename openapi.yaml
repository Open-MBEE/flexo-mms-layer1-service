  /orgs/{orgId}/repos/{repoId}/locks/{lockId}/query/inspect:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
      - $ref: '#/components/parameters/lockId'
    post:
      tags: [SPARQL Query]
      summary: SPARQL query against a lock with inspection (via body)
