      requestBody:
        required: true
        content:
          text/turtle:
            schema:
              type: string
            example: |
              <> dct:title "My Collection"@en ;
                  mms:collects <../repos/my-repo/branches/master>, 
                               <../repos/my-repo/scratches/ontology>,
                               <../repos/my-repo2/locks/2026-03-19> ;
                  .
      responses:
        '201':
          $ref: '#/components/responses/CreatedResponse'

  /orgs/{orgId}/collections/{collectionId}:
    parameters:
      - $ref: '#/components/parameters/orgId'
