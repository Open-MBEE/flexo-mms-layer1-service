  /orgs/{orgId}/repos/{repoId}/query:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
    post:
      tags: [SPARQL Query]
      summary: SPARQL query against a repository (via body)
      operationId: queryRepoPost
      requestBody:
        $ref: '#/components/requestBodies/SparqlQueryBody'
      responses:
        '200':
          $ref: '#/components/responses/SparqlResultsJsonResponse'

  /orgs/{orgId}/repos/{repoId}/query/inspect:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/repoId'
    post:
      tags: [SPARQL Query]
      summary: SPARQL query against a repository with inspection (via body)
      operationId: queryRepoInspectPost
      requestBody:
        $ref: '#/components/requestBodies/SparqlQueryBody'
      responses:
        '200':
          $ref: '#/components/responses/SparqlResultsJsonResponse'

